<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScarabCrafts</title>
  <meta name="description" content="ScarabCrafts. Halifax, Nova Scotia."/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00ff41;
      --green-dim:  #00cc33;
      --green-glow: rgba(0, 255, 65, 0.15);
      --bg:         #080808;
      --surface:    #0e0e0e;
      --border:     rgba(0, 255, 65, 0.18);
      --text:       #e0e0e0;
      --muted:      #666;
      --mono:       'Share Tech Mono', monospace;
      --sans:       'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Matrix rain canvas ── */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.13;
      pointer-events: none;
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(12px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      height: 60px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .nav-logo-text {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--green);
      letter-spacing: 0.08em;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 60px;
      text-align: center;
    }

    .hero .container { width: 100%; }

    .hero-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin: 0 auto 32px;
      display: block;
      filter: drop-shadow(0 0 24px rgba(0, 255, 65, 0.5));
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,65,0.4)); }
      50%       { filter: drop-shadow(0 0 40px rgba(0,255,65,0.8)); }
    }

    .hero-title {
      font-family: var(--mono);
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--green);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      text-shadow: 0 0 30px rgba(0,255,65,0.4);
    }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Products ── */
    section {
      padding: 96px 0;
      position: relative;
      z-index: 1;
    }

    .product-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px;
      background: var(--surface);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 28px;
      align-items: center;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      border-color: var(--green-dim);
      box-shadow: 0 0 32px var(--green-glow);
    }

    .product-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .product-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
    }

    .product-name {
      font-family: var(--mono);
      font-size: 1.25rem;
      color: var(--green);
      margin-bottom: 6px;
    }

    .product-desc {
      color: var(--muted);
      font-size: 0.9375rem;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      position: relative;
      z-index: 1;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-brand img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .footer-brand-name {
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--green);
    }

    .footer-copy {
      color: var(--muted);
      font-size: 0.8125rem;
      text-align: center;
      margin-top: 16px;
    }

    .footer-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8125rem;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--green); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .product-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Matrix rain -->
  <canvas id="matrix"></canvas>

  <!-- ── NAV ── -->
  <nav>
    <div class="container nav-inner">
      <a href="#" class="nav-logo">
        <img src="logo.png" alt="ScarabCrafts logo"/>
        <span class="nav-logo-text">ScarabCrafts</span>
      </a>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section class="hero">
    <div class="container">
      <img src="logo.png" alt="ScarabCrafts" class="hero-logo"/>
      <h1 class="hero-title">ScarabCrafts</h1>
      <p class="hero-sub">Halifax, Nova Scotia.</p>
    </div>
  </section>

  <hr class="divider"/>

  <!-- ── PRODUCTS ── -->
  <section id="products">
    <div class="container">
      <a href="https://apps.apple.com/ca/app/bond-relationship-habits/id6760212306" target="_blank" rel="noopener noreferrer" class="product-card">
        <div class="product-icon"><img src="bond-icon.png" alt="Bond"/></div>
        <div>
          <p class="product-name">Bond</p>
          <p class="product-desc">One micro action a day keeps the resentment away.</p>
        </div>
      </a>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <a href="#" class="footer-brand">
          <img src="logo.png" alt="ScarabCrafts"/>
          <span class="footer-brand-name">ScarabCrafts</span>
        </a>
        <ul class="footer-links">
          <li><a href="mailto:bondapp@scarabcrafts.com">Contact</a></li>
          <li><a href="terms.html">Terms</a></li>
          <li><a href="privacy.html">Privacy</a></li>
        </ul>
      </div>
      <p class="footer-copy">&copy; 2026 ScarabCrafts. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const chars  = 'アイウエオカキクケコサシスセソタチツテトナニヌネノABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>{}[]|/\\';
    const size   = 14;
    let columns  = Math.floor(canvas.width / size);
    let drops    = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(8, 8, 8, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font      = size + 'px Share Tech Mono, monospace';

      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * size, drops[i] * size);
        if (drops[i] * size > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 40);

    window.addEventListener('resize', () => {
      resize();
      columns = Math.floor(canvas.width / size);
      drops   = Array(columns).fill(1);
    });
  </script>
</body>
</html>
